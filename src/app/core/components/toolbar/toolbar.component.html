<div
  class="toolbar-host"
  [class.revealed]="chrome.revealed()"
  [class.peeking]="chrome.peeking()"
  [class.editing]="isEditing()"
>
  <button
    type="button"
    class="peek-strip"
    aria-label="Show navigation toolbar"
    [attr.tabindex]="chrome.peeking() ? 0 : -1"
    (click)="reveal()"
  ></button>

  <div
    class="toolbar"
    role="toolbar"
    aria-label="Navigation"
    [inert]="!chrome.revealed()"
    (mouseenter)="onPointerEnter()"
    (mouseleave)="onPointerLeave()"
  >
    <div class="toolbar-group toolbar-start">
      @if (isEditing()) {
        <span class="editing-label"><mat-icon>edit</mat-icon>Editing layout</span>
      } @else {
        <button mat-icon-button aria-label="Open menu" [matMenuTriggerFor]="appMenu">
          <mat-icon>menu</mat-icon>
        </button>
        @if (fullscreenSupported()) {
          <button
            mat-icon-button
            [attr.aria-label]="fullscreenStatus() ? 'Exit fullscreen' : 'Enter fullscreen'"
            (click)="toggleFullScreen()"
          >
            <mat-icon>{{ fullscreenStatus() ? 'close_fullscreen' : 'fullscreen' }}</mat-icon>
          </button>
        }
        @if (!autoNightMode()) {
          <button
            mat-icon-button
            [attr.aria-label]="isNightMode() ? 'Day mode' : 'Night mode'"
            (click)="toggleNightMode()"
          >
            <mat-icon>{{ isNightMode() ? 'light_mode' : 'mode_night' }}</mat-icon>
          </button>
        }
      }
    </div>

    <div class="toolbar-group toolbar-center">
      @if (!isEditing()) {
        <page-nav-control />
        <button mat-icon-button class="manage-pages" aria-label="Manage pages" (click)="openPageManager()">
          <mat-icon>build</mat-icon>
        </button>
      }
    </div>

    <div class="toolbar-group toolbar-end">
      <button mat-icon-button aria-label="Notifications" (click)="openNotifications()">
        <mat-icon
          [matBadge]="alarmCount()"
          [matBadgeHidden]="!alarmCount()"
          matBadgeSize="small"
          matBadgeColor="warn"
        >notifications</mat-icon>
      </button>
      @if (!isEditing()) {
        <button mat-icon-button aria-label="Edit page" (click)="enterEdit()">
          <mat-icon>lock_open</mat-icon>
        </button>
      }
    </div>
  </div>
</div>

<mat-menu #appMenu="matMenu">
  <button mat-menu-item (click)="openSettings()">
    <mat-icon svgIcon="settings"></mat-icon>
    <span>Settings</span>
  </button>
  <button mat-menu-item (click)="openConnection()">
    <mat-icon svgIcon="cloud"></mat-icon>
    <span>Connection</span>
  </button>
  <button mat-menu-item (click)="openRemote()">
    <mat-icon svgIcon="remote-control"></mat-icon>
    <span>Remote Control</span>
  </button>
  <button mat-menu-item (click)="openHelp()">
    <mat-icon svgIcon="help-center"></mat-icon>
    <span>Help</span>
  </button>
  <div
    style="padding: 6px 16px; font-size: 0.78em; opacity: 0.6; white-space: nowrap; pointer-events: none;"
  >Skip v{{ appVersion() }} · {{ host }}</div>
</mat-menu>
