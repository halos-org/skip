[bumpversion]
current_version = 4.8.0
commit = True
tag = False

[bumpversion:file:VERSION]

[bumpversion:file:package.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

# The generated MCP schema artifact stamps the app version as meta.skipVersion,
# and test:mcp-schema gates it against drift in CI. Keep it in step on a bump so
# a version change alone never fails CI (no schema regen needed).
[bumpversion:file:src/assets/skip-dashboard-schema.json]
search = "skipVersion": "{current_version}"
replace = "skipVersion": "{new_version}"
