<mat-action-list>
  @for (item of items; track item.id) {
    <button mat-list-item (click)="clickAction(item.id)">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </button>
  }
</mat-action-list>

<button type="button" class="widget-action-cancel" (click)="clickAction('cancel')">
  Cancel
</button>
