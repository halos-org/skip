<widget-title
  [text]="runtime.options().displayName"
  [color]="runtime.options().color">
</widget-title>
@if (!dashboard.isDashboardStatic()) {
  <div class="widgetOverlay"
    kipGestures mode="press" [enablePress]="false" [enableTap]="true" [enableDoubleTap]="false"
    (tap)="onSingleTap($event)">
  </div>
}
<action-menu #actionMenu [items]="widgetActions" (selected)="onWidgetAction($event)" />
