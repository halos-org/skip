<div
  class="kip-app-shell"
  kipGestures
  [mode]="'all'"
  [enablePress]="false"
  [enableDoubleTap]="false"
  kipScrollNav
  [navEnabled]="dashboardStatic()"
  [suspended]="!dashboardVisible() || isDragging()"
  (swipeup)="onChromeIntent('hide')"
  (swipedown)="onChromeIntent('reveal')"
  (swipeleft)="pageNav('next')"
  (swiperight)="pageNav('prev')"
  (pageNav)="pageNav($event)"
  (chromeIntent)="onChromeIntent($event)"
  (pointerdown)="onShellPointerDown($event)"
  (mousemove)="onMouseActivity()"
>
  @if (dashboardVisible() && !embed()) {
    <app-toolbar />
  }
  <router-outlet class="router-outlet-container" />
</div>

@if (upgrade.upgrading()) {
  <div class="config-upgrade-overlay" role="alert" aria-live="polite">
    <div class="config-upgrade-card">
      <mat-progress-spinner diameter="46" mode="indeterminate"></mat-progress-spinner>
      <div class="config-upgrade-text">
        <h3>Upgrading Configuration…</h3>
        <p>Please wait a moment while we migrate your pages and widgets.</p>
        @if (upgrade.messages().length) {
          <ul #upgradeMessages class="config-upgrade-messages">
            @for (m of upgrade.messages(); track $index) {
              <li>{{ m }}</li>
            }
          </ul>
        }
      </div>
    </div>
  </div>
}
