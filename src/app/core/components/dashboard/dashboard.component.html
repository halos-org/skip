@let dashboardStatic = dashboardStaticView() ?? true;
<div class="page-slide" #pageSlide>
<gridstack skipGestures [mode]="dashboardStatic === true ? 'press' : 'editor'" [enablePress]="false" [enableTap]="dashboardStatic === false" [enableDoubleTap]="false" #grid
  [isEmpty]="false"
  [options]="gridOptions()"
  (addedCB)="onGridItemsChanged()"
  (removedCB)="onGridItemsChanged()"
  (tap)="onEmptyAreaTap($event)"
>
</gridstack>
@if (gridIsEmpty()) {
  <div
    class="dashboard-empty-state-container"
    skipGestures
    [mode]="dashboardStatic === true ? 'press' : 'editor'"
    [enablePress]="false"
    [enableTap]="dashboardStatic === false"
    [enableDoubleTap]="false"
    (tap)="onEmptyAreaTap($event)"
  >
    <div class="dashboard-empty-state-action">
      <mat-icon class="empty-state-icon">dashboard</mat-icon>
      @if (!dashboardStatic) {
        <p class="empty-state-text"><strong>Tap anywhere</strong> to add widgets</p>
        <mat-icon class="touch-icon">touch_app</mat-icon>
      } @else {
        <p class="empty-state-text">This empty page is ready to be customized.</p>
        @if (!embed()) {
          <button class="empty-state-button" mat-flat-button (click)="editDashboard()">
            <mat-icon>lock_open</mat-icon>
            Unlock and Customize
          </button>
        }
      }
    </div>
    <div>
      <div class="empty-state-help">
          <button class="empty-state-help-button" mat-button (click)="navigateToHelp()">
            <mat-icon>help</mat-icon>
            Get Help
          </button>
        </div>
    </div>
  </div>
}
</div>
<action-menu #actionMenu [items]="emptyAreaActions()" (selected)="onEmptyAreaAction($event)" />
@if (!dashboardStatic) {
  <div class="edit-layout-close-icon">
    <button
      mat-fab
      class="cancel"
      style="margin-right: 10px"
      aria-label="Cancel editing"
      (click)="cancelLayoutChanges()"
    >
      <mat-icon>close</mat-icon>
    </button>
    <button
      mat-fab
      class="save"
      aria-label="Done editing"
      (click)="saveLayoutChanges()"
    >
      <mat-icon>done</mat-icon>
    </button>
  </div>
}
