<mat-card kipGestures mode="press" appearance="raised" class="widget-container kip-widget-card-colors" [style.border]="dashboardStaticView() ? '1px dashed transparent' : '1px dashed var(--mat-sys-outline)'"
  twoFingerTap
  [twoFingerTapEnabled]="dashboardStaticView()"
  (twoFingerTap)="onHistoryTwoFingerTap($event)"
  (doubletap)="openWidgetOptions($event)"
  (press)="openBottomSheet($event)"
  (contextmenu)="openWidgetHistoryDialog($event)">
  <ng-container #childOutlet></ng-container>
  @if (loadFailed()) {
    <button type="button" class="widget-load-error" (click)="retryWidgetLoad()">
      <span class="widget-load-error__title">Widget failed to load</span>
      <span class="widget-load-error__hint">Tap to retry</span>
    </button>
  }
</mat-card>
